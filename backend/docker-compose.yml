services:

  postgres:
    image: postgres:16
    container_name: stygianMaxxer_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: stygianMaxxer_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d stygianMaxxer_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: stygianMaxxer_app
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy   # waits for DB to be ready before starting
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DB_URL: jdbc:postgresql://postgres:5432/stygianMaxxer_db
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET}      # required — no default, will fail fast if missing

volumes:
  pgdata:
