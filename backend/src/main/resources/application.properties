spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/stygianMaxxer_db
spring.datasource.username=admin
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

security.jwt.issuer=stygian-maxxer
# Use a long random string (32+ chars); prefer an env var in real deployments
security.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_SECRET_32PLUS_CHARS
security.jwt.expiration-seconds=86400