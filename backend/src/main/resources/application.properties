spring.application.name=backend
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stygianMaxxer_db}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}

spring.flyway.enabled=true

security.jwt.issuer=stygian-maxxer
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

# Upstash Redis — used for rate limiting on /auth/login and /auth/register.
# Set REDIS_URL on Fly.io to the rediss:// connection string from your
# Upstash dashboard (TLS, includes credentials inline).
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}